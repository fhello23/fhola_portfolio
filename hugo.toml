baseURL = 'https://fhola.com/'
languageCode = 'en-us'
title = 'fhola'
theme = 'typo'

# Google analytics code
#googleAnalytics = "G-xxxxxxxxx"

[taxonomies]
tag = 'tags'

[params]
# Meta description
description = "fhola's portfolio"

# Appearance settings
theme = 'auto'
colorPalette = 'default'
hideHeader = false

# Intro on main page, content is markdown
homeIntroTitle = 'Hola!'
homeIntroContent = """
¡Hola! Bienvenido a fhola.com: aquí encontrarás mis proyectos de programación y material educativo."""

# Collection to display on home
homeCollectionTitle = 'Proyectos'
homeCollection = 'proyectos'

# Lists parameters
paginationSize = 100
listSummaries = true
listDateFormat = '2 Jan 2006'

# Breadcrumbs
[params.breadcrumbs]
enabled = true
showCurrentPage = true
home = "Home"

# Social icons

[[params.social]]
name = "github"
url = "https://github.com/fhello23"

[[params.social]]
name = "gmail"
url = "mailto:fihf99@gmail.com"

# Main menu pages
[[params.menu]]
name = "home"
url = "/"

[[params.menu]]
name = "proyectos"
url = "/proyectos"



# Syntax highlight on code blocks
[markup]
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    hl_Lines = ''
    hl_inline = false
    lineAnchors = ''
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = true
    noClasses = true
    style = 'github'
    tabWidth = 4
    wrapperClass = 'highlight'

# Giscus comments
[params.giscus]
enable = false
repo = "user/repo"
repoid = "repoId"
category = "General"
categoryid = "categoryId"
mapping = "pathname"
theme = "preferred_color_scheme"


[module]
[[module.imports]]
path = "github.com/tomfran/typo"

[caches]
  [caches.images]
    dir = ':cacheDir/images'